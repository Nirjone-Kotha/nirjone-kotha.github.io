<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex,nofollow">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0f625c" />
  <title>Moner Kotha — Offline</title>
  <style>
    body{margin:0;min-height:100dvh;display:grid;place-items:center;padding:max(16px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) max(16px,env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left));box-sizing:border-box;background:#f3f8f7;color:#20263b;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
    .card{width:min(520px,100%);padding:28px;box-sizing:border-box;border:1px solid #dfe4ef;border-radius:24px;background:#fff;box-shadow:0 18px 60px rgba(31,42,74,.12);text-align:center}
    .mark{width:64px;height:64px;margin:auto;border-radius:22px;background:#0f625c;display:grid;place-items:center;color:#fff;font-size:28px;font-weight:900}
    h1{margin:18px 0 8px;font-size:clamp(26px,6vw,36px)}p{color:#687086;line-height:1.75;margin:8px 0}.bn{font-family:system-ui,-apple-system,"Noto Sans Bengali","Segoe UI",sans-serif}button{margin-top:12px;border:0;border-radius:13px;background:#0f625c;color:#fff;padding:12px 18px;font-weight:800;cursor:pointer}
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">M</div>
    <h1>You are offline</h1>
    <p>Previously opened parts of the app may still be available. Try again when your internet connection returns.</p>
    <p class="bn" lang="bn"><strong>ইন্টারনেট সংযোগ নেই</strong><br>আগে খোলা ও সংরক্ষিত অংশগুলো ব্যবহার করা যেতে পারে। সংযোগ ফিরে এলে আবার চেষ্টা করুন।</p>
    <button type="button" onclick="location.reload()">Try again · আবার চেষ্টা করুন</button>
  </main>
</body>
</html>
